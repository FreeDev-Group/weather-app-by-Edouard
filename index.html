<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Now</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <img src="assets/images/logo.svg">
            </div>

            <div class="units-dropdown">
                <button class="unit" id="unitsBtn">
                    Units °C ⌄
                </button>

                <div class="dropdown-menu" id="unitsMenu">
                    <p class="dropdown-title">Temperature</p>
                    <div class="option active">Celsius (°C)</div>
                    <div class="option">Fahrenheit (°F)</div>

                    <p class="dropdown-title">Wind Speed</p>
                    <div class="option active">km/h</div>
                    <div class="option">mph</div>

                    <p class="dropdown-title">Precipitation</p>
                    <div class="option active">Millimeters (mm)</div>
                </div>

                <!-- HERO -->
                <section class="hero">
                    <h1>How’s the sky looking today?</h1>

                    <div class="search">
                        <input type="text" placeholder="Search for a place..." id="searchInput">
                        <button id="searchBtn">Search</button>
                        <ul id="suggestions" class="suggestions-list"></ul>
                    </div>
                </section>
            </div>
        </header>

    </div>
    <script src="app.js"></script>
</body>

</html>
